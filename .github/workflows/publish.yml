name: Publish

# Tag a release to publish, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
#
# Publishing uses nuget.org Trusted Publishing (OIDC) — there is no long-lived API key.
# The trusted publishing policy on nuget.org is bound to THIS FILE'S NAME (publish.yml)
# plus the owner/repo, so renaming or moving this file breaks publishing until the policy
# is updated to match.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 1.1.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # lets this job request the GitHub OIDC token nuget.org validates

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # A tag is the single source of truth for the released version.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Build
        run: dotnet build VpnHood.Tools.ResourceTranslator.slnx --configuration Release

      - name: Test
        run: dotnet test VpnHood.Tools.ResourceTranslator.slnx --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack src/VpnHood.Tools.ResourceTranslator/VpnHood.Tools.ResourceTranslator.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.version }}
          --output ./artifacts

      # Exchange the GitHub OIDC token for a temporary nuget.org key. It is valid for one
      # hour and single-use, so this runs immediately before the push rather than earlier.
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }} # nuget.org profile name, not an email address

      - name: Push to NuGet
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
