name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore VpnHood.ResourceTranslator.slnx

      - name: Build
        run: dotnet build VpnHood.ResourceTranslator.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test VpnHood.ResourceTranslator.slnx --configuration Release --no-build

      # Proves the tool still packages cleanly before anyone tags a release.
      - name: Pack
        run: dotnet pack src/VpnHood.ResourceTranslator/VpnHood.ResourceTranslator.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
